schema_version: 1

context:
  name: ada-py
  version: "0.33.0"
  python_min: "3.11"

recipe:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/Krande/adapy/archive/v${{ version }}.tar.gz
  sha256: ffb1915b75916e5d825b8d5a77e17bf526c495c9210fd4ec1a6454cb31d2e0b8

build:
  number: 0

outputs:
  - package:
      name: ${{ name }}-core
    build:
      noarch: python
      script: python -m pip install . --no-deps -vv
      python:
        entry_points:
          - ada=ada_cli.main:main
    requirements:
      host:
        - pip
        - setuptools
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
    about:
      description: |
        The core package without dependencies of ADAPY, a python library for structural analysis and design.

  - package:
      name: ${{ name }}
    build:
      noarch: python

    requirements:
      run:
        - python >=${{ python_min }}
        - numpy
        - hdf5
        - h5py
        - ifcopenshell
        - bcf-client
        - pythonocc-core
        - python-gmsh
        - pyquaternion
        - trimesh
        - occt >=7.7.2
        - send2trash
        - meshio
        - websockets
        - plotly
        - python-kaleido
        - pydantic
        - ipywidgets
        - jupyterlab
        - pyparsing
        - pyglfw
        - pygfx
        - python-flatbuffers
        - ${{ pin_subpackage("ada-py-core", exact=True) }}
    tests:
      - python:
          imports:
            - ada
          pip_check: false
          python_version: ${{ python_min }}.*
      - files:
          source:
            - tests
            - files
        requirements:
          run:
            - python ${{ python_min }}.*
            - pytest
            - pytest-cov
            - pytest-asyncio
            - calculix
            - libgl-devel
            - mesalib
            - xorg-libxdamage
            - xorg-libxxf86vm
            - xorg-libxext
        script:
          # test_no_call_site_reimplements_the_env_parse greps the upstream src/ tree, which is not
          # part of the test files copied here; it is a repo lint, not a package test.
          - pytest tests --ignore=tests/fem --ignore=tests/profiling --ignore=tests/examples --ignore=tests/full/frontend --ignore=tests/comms/rest --cov=ada --cov-report=xml --ignore=tests/core/visit/plotting/test_easy_plotly.py --deselect 
            tests/core/cad/test_tess_env_defaults.py::test_no_call_site_reimplements_the_env_parse

about:
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: A python library for structural analysis and design
  homepage: https://github.com/krande/adapy
  documentation: https://krande.github.io/adapy/

extra:
  recipe-maintainers:
    - Krande
